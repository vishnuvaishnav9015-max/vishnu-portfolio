<html lang="en" class="dark">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishnu Vaishnav | Full Stack Developer Portfolio</title>
    <meta name="description" content="Professional portfolio showcasing 6 impressive full-stack projects including E-commerce, SaaS Dashboard, Social Media, Project Management, Real Estate, and Fintech applications." />
    <meta name="keywords" content="Web Developer, Full Stack Developer, React Developer, Portfolio, Vishnu Vaishnav, Frontend Developer, Backend Developer" />
    <meta name="author" content="Vishnu Vaishnav" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vishnu Vaishnav | Full Stack Developer Portfolio" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-white text-surface-900 dark:bg-surface-950 dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
